    /**
     * @function parseDedicacion
     * Normaliza cualquier formato de dedicación a un número decimal (0 a 1).
     * Soporta: "30%" → 0.3, "0.3" → 0.3, 0.3 → 0.3, "100%" → 1, "1" → 1
     */
    const parseDedicacion = (valor) => {
        if (valor === null || valor === undefined || valor === '') return 0;
        var str = String(valor).trim();
        if (str.includes('%')) {
            // Formato antiguo: "30%" → 0.3
            return (parseInt(str.replace('%', ''), 10) || 0) / 100;
        }
        var num = parseFloat(str) || 0;
        // Si el número es mayor a 1 (ej: alguien guardó "30" sin %), asumir que es porcentaje
        if (num > 1) {
            return num / 100;
        }
        return num;
    }

    /**
     * @function formatDedicacionDisplay
     * Convierte un valor de dedicación (cualquier formato) a texto legible: "30%"
     */
    const formatDedicacionDisplay = (valor) => {
        var dec = parseDedicacion(valor);
        return Math.round(dec * 100) + '%';
    }

    /**
     * @function validarDedicacion
     * Valida que la dedicación total no supere 1 (100%) en períodos de tiempo
     * que se solapan con la nueva experiencia.
     * Soporta tanto el formato antiguo ("30%") como el nuevo (0.3).
     * @param {string} nuevaFechaIn - Fecha inicio (YYYY-MM-DD)
     * @param {string} nuevaFechaFin - Fecha fin (YYYY-MM-DD)
     * @param {string} nuevaDedicacion - Dedicación nueva (ej: "0.3" o "30%")
     * @param {number|null} indiceExcluir - Índice a excluir (para edición)
     * @returns {object} { valido, dedicacionNueva, totalConflicto, experienciasConflicto }
     */
    const validarDedicacion = (nuevaFechaIn, nuevaFechaFin, nuevaDedicacion, indiceExcluir) => {

        var dedicacionNueva = parseDedicacion(nuevaDedicacion);

        if (dedicacionNueva === 0) {
            return { valido: true, totalConflicto: 0, dedicacionNueva: 0, experienciasConflicto: [] };
        }

        var inicioNuevo = new Date(nuevaFechaIn + 'T00:00:00');
        var finNuevo = new Date(nuevaFechaFin + 'T00:00:00');

        if (isNaN(inicioNuevo.getTime()) || isNaN(finNuevo.getTime())) {
            return { valido: true, totalConflicto: 0, dedicacionNueva: dedicacionNueva, experienciasConflicto: [] };
        }

        var dedicacionSolapada = 0;
        var experienciasConflicto = [];

        for (var i = 0; i < experienciaPer.length; i++) {
            if (indiceExcluir !== null && indiceExcluir !== undefined && i === indiceExcluir) {
                continue;
            }

            var exp = experienciaPer[i];
            var inicioExp = new Date(exp.fechaIn + 'T00:00:00');
            var finExp = new Date(exp.fechaFin + 'T00:00:00');

            if (isNaN(inicioExp.getTime()) || isNaN(finExp.getTime())) {
                continue;
            }

            // Verificar solapamiento temporal
            if (inicioNuevo <= finExp && finNuevo >= inicioExp) {
                var dedExp = parseDedicacion(exp.dedicacion);
                dedicacionSolapada += dedExp;
                experienciasConflicto.push({
                    empresa: exp.empresa,
                    dedicacion: dedExp,
                    fechaIn: exp.fechaIn,
                    fechaFin: exp.fechaFin
                });
            }
        }

        var totalDedicacion = dedicacionSolapada + dedicacionNueva;

        // Usar tolerancia para evitar problemas de punto flotante (ej: 0.1 + 0.2 + 0.7 = 1.0000000000000002)
        if (totalDedicacion > 1.0001) {
            return {
                valido: false,
                totalConflicto: totalDedicacion,
                dedicacionNueva: dedicacionNueva,
                experienciasConflicto: experienciasConflicto
            };
        }

        return { valido: true, totalConflicto: totalDedicacion, dedicacionNueva: dedicacionNueva, experienciasConflicto: [] };
    }

        const buttonApply = `<button type="button" id="comprobar" class="btn btn-primary">Guardar Cambios</button>`
        const bntAplicar = document.getElementById('bntAplicar')
        bntAplicar.innerHTML = buttonApply;



        // Fetch all the forms we want to apply custom Bootstrap validation styles to
        var forms = document.querySelectorAll('.formExperiencia')
        var comprobar = document.getElementById('comprobar')
        var status = document.getElementById("estadoForm")

        // Loop over them and prevent submission
        Array.prototype.slice.call(forms)
            .forEach(function (form) {
                comprobar.addEventListener('click', function (event) {
                    status.innerHTML = '<span class="badge" style="background-color:#EFECE1; color:#333;">En progreso</span>'
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                        form.classList.add('was-validated')
                    }
                    else {
                        event.preventDefault()

                        // Validar dedicación antes de guardar
                        var fechaInVal = document.getElementById('fechaIn').value;
                        var fechaFinVal = document.getElementById('fechaFin').value;
                        var dedicacionVal = document.getElementById('dedicacion').value;
                        var resultadoVal = validarDedicacion(fechaInVal, fechaFinVal, dedicacionVal, null);

                        if (!resultadoVal.valido) {
                            mostrarAlertaDedicacion(resultadoVal);
                            return; // No guardar
                        }

                        ocultarAlertaDedicacion();
                        datosPersonas()
                        $('#exampleModal').modal('hide');
                        document.getElementById('formFormacion').reset();
                        document.getElementById('formFormacion').noValidate = false;

                    }
                }, false)
            })

        //Si existen modificaciones genera una alerta
        Array.prototype.slice.call(forms)
            .forEach(function (form) {
                form.addEventListener('change', function (event) {
                    status.innerHTML = '<span class="badge" style="background-color:#EFECE1; color:#333;">En progreso</span>'

                    //Modificamos la barra de progreso constantemente
                    const valor = progreso()
                    if (valor == 100) {
                        status.innerHTML = '<span class="badge bg-success">Completo</span>'
                    }
                    barraProgreso(valor)

                }, false)
            })

    }

    /**
  * @function limpiarForm
  * Limpia los inputs del formulario
 */
    const limpiarForm = () => {
        // document.getElementById('formExperiencia').classList.remove("was-validated");
        const formsA = document.getElementById('formExperiencia')
        const status = document.getElementById("estadoForm")

        formsA.reset()

        status.innerHTML = "";
        barraProgreso(0)
        archivos = [];
        $("#progress").css("display", "none");
        $("#btnCargar").css("display", "none");
        ruta = ""

    }



    const aplicarExperiencia = (index) => {

        const empresa = document.getElementById("empresa").value
        const cargo = document.getElementById("cargo").value
        const fechaIn = document.getElementById("fechaIn").value
        const fechaFin = document.getElementById("fechaFin").value
        const objeto = document.getElementById("objeto").value
        const funciones = document.getElementById("funciones").value
        const clasificacionn = document.getElementById("clasificacionn").value
        const tipoproy = document.getElementById("tipoproy").value
        const dedicacion = document.getElementById("dedicacion").value

        // Validar dedicación antes de aplicar cambios
        var resultadoVal = validarDedicacion(fechaIn, fechaFin, dedicacion, indice);
        if (!resultadoVal.valido) {
            mostrarAlertaDedicacion(resultadoVal);
            return; // No guardar
        }
        ocultarAlertaDedicacion();

        if (experienciaPer.length > 0) {

            // Guardar valores VIEJOS para borrar la fila anterior del Sheet
            var oldItem = experienciaPer[indice];
            var oldEmpresa = oldItem.empresa;
            var oldCargo = oldItem.cargo;
            var oldFechaIn = oldItem.fechaIn;

            // Actualizar el array local
            experienciaPer[indice].cedula = persona.cedula
            experienciaPer[indice].empresa = empresa
            experienciaPer[indice].objeto = objeto
            experienciaPer[indice].cargo = cargo
            experienciaPer[indice].fechaIn = fechaIn
            experienciaPer[indice].fechaFin = fechaFin
            experienciaPer[indice].funciones = funciones
            experienciaPer[indice].adjunto = ruta || oldItem.adjunto
            experienciaPer[indice].sectorr = ""
            experienciaPer[indice].clasificacionn = clasificacionn
            experienciaPer[indice].tipoproy = tipoproy
            experienciaPer[indice].dedicacion = dedicacion

            // 1. Borrar la fila vieja del Sheet
            google.script.run
                .withSuccessHandler(function () {
                    console.log('✅ Fila vieja eliminada del Sheet')
                })
                .withFailureHandler(function (error) {
                    console.error('❌ Error eliminando fila vieja:', error)
                })
                .eliminarExperienciaRow(
                    persona.cedula,
                    oldEmpresa,
                    oldCargo,
                    oldFechaIn
                );

            // Mover el elemento editado al final del array para mostrarlo abajo
            var editedItem = experienciaPer.splice(indice, 1)[0];
            experienciaPer.push(editedItem);

            // 2. Agregar la fila actualizada al Sheet
            var updatedRow = Object.values(editedItem)
            google.script.run
                .withSuccessHandler(function () {
                    console.log('✅ Fila editada guardada en Sheet')
                    var toastMsn = {
                        bg: "bg-success",
                        title: "Editado",
                        msn: "Cambios guardados en la base de datos",
                        icon: "fas fa-check"
                    }
                    alertaMsn(toastMsn)
                    var status = document.getElementById("estadoForm")
                    status.innerHTML = '<span class="badge bg-success text-white">Guardado</span>'
                })
                .withFailureHandler(function (error) {
                    console.error('❌ Error guardando edición:', error)
                    var toastMsn = {
                        bg: "bg-danger",
                        title: "Error",
                        msn: "Error al guardar edición: " + error.message,
                        icon: "fas fa-times"
                    }
                    alertaMsn(toastMsn)
                })
                .appendExperienciaRow(updatedRow);

            $('#exampleModal').modal('hide');
            document.getElementById('formExperiencia').reset();
            tablaVinculados()

        }

    }


    //Carga los documentos que se envian al drive
    const saveFile = (file, cedula) => {
        //const file = f.files[0];
        console.log('archivo ' + file.name)


        const fr = new FileReader();
        var id = '1he4FSUfNNB8BEHQDB4LHz8HtYz4k6yPl'
        fr.onload = function (e) {
            const obj = {
                filename: file.name,
                mimeType: file.type,
                bytes: [...new Int8Array(e.target.result)]
            };
            google.script.run.withSuccessHandler(validacionAdjunto).saveFile2(obj, cedula, id);
            $("#progress").css("display", "flex");

        };
        fr.readAsArrayBuffer(file);
    }

    //Valida que se carguen los archivos
    const validacionAdjunto = (data) => {

        var e = data[0];
        var url = data[1];

        ruta = url;

        if (e) {


            $('#barra').removeClass('progress-bar-striped progress-bar-animated').addClass('bg-success');
            $('#barra').text('Completo');
            $('.archivo').val('');
            archivos = [];


        } else {

            $('#barra').removeClass('progress-bar-striped progress-bar-animated').addClass('bg-danger');
            $('#barra').text('Hubo un error');
            $('#formFile').val('');
            archivos = [];

        }
    }


    //Esta función ejecuta el metodo que carga los archivos al drive
    const cargarInfo = () => {

        var f = archivos[0];
        var cedula = persona.cedula;

        saveFile(f, cedula)

    }



    //Esta funcion carga todos los archivos en un array de objetos (sin mostrar botón Cargar)
    const arrayObjetos = (f) => {
        var objeto = f[0];
        var file = objeto.files[0];
        console.log('archivo seleccionado: ' + file.name)
        archivos = [file]; // Solo un archivo a la vez
    }

    //Genera una alerta de error
    const alertaMsn = (toastMsn) => {



        var option = {
            animation: true,
            delay: 2000,
        }

        var toastBody =
            `<div class="toast-container position-fixed bottom-0 end-0 p-3">

            <div class="toast text-dark" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header ${toastMsn.bg}" style="${toastMsn.bgStyle || ''}" >
                    <i class="${toastMsn.icon} rounded me-2"></i>
                    <strong class="me-auto">${toastMsn.title}</strong>
                    <small class="text-dark">Ahora</small>
                    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body ${toastMsn.bg}" style="${toastMsn.bgStyle || ''}">
                ${toastMsn.msn}
                </div>
            </div>
        </div>`

        const noti = document.getElementById('notificaciones').innerHTML = toastBody

        var toastElList = [].slice.call(document.querySelectorAll('.toast'))
        var toastList = toastElList.map(function (toastEl) {
            return new bootstrap.Toast(toastEl, option)
        })

        toastList.map(function (toast) {
            toast.show()
        })
    }




</script>
